<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Example</title>
    <style>
        .main_div {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: space-between;
            height: 50vh;
            border: 10px solid blue;
        }

        #div1 {
            border: 5px solid black;
            background-color: green;
        }

        #div2 {
            border: 5px solid black;
            background-color: aqua;
        }

        #div3 {
            border: 5px solid black;
            background-color: red;
        }

        #div4 {
            border: 5px solid black;
            background-color: yellow;
        }
    </style>
</head>

<body>
    <div class="main_div">
        <div id="div1">
            <h1>This is div 1</h1>
        </div>
        <div id="div2">
            <h1>This is div 2</h1>
        </div>
        <div id="div3">
            <h1>This is div 3</h1>
        </div>
        <div id="div4">
            <h1>This is div 4</h1>
        </div>
    </div>
</body>

</html>
