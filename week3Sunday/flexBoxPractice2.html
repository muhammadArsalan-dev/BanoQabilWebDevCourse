<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline-Flexbox Example</title>
  <style>
    .main_div {
      display: inline-flex;
      flex-direction: column-reverse;
      align-items: center;
      justify-content: space-evenly;
      height: 100vh;
      border: 10px solid blueviolet;
    }
    #div1, #div2, #div3, #div4 {
      border: 5px solid black;
      padding: 10px;
    }
    #div1 { background-color: green; }
    #div2 { background-color: aqua; }
    #div3 { background-color: red; }
    #div4 { background-color: yellow; }
  </style>
</head>
<body>
  <div class="main_div">
    <div id="div1"><h1>This is div 1</h1></div>
    <div id="div2"><h1>This is div 2</h1></div>
    <div id="div3"><h1>This is div 3</h1></div>
    <div id="div4"><h1>This is div 4</h1></div>
  </div>
</body>
</html>
